name: Push gem to RubyGems

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  push:
    if: github.repository == 'mbj/anima'
    runs-on: ubuntu-latest
    environment:
      name: rubygems.org
      url: https://rubygems.org/gems/anima
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
      - uses: rubygems/configure-rubygems-credentials@v1.0.0
      - name: Update RubyGems
        run: gem update --system
      - name: Build gem
        run: gem build anima.gemspec
      - name: Sign gem with Sigstore
        run: gem exec sigstore-cli sign *.gem --bundle anima.gem.sigstore.json
      - name: Push gem
        run: gem push *.gem --attestation anima.gem.sigstore.json
      - name: Wait for release
        run: gem exec rubygems-await *.gem
