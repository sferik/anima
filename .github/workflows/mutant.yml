name: Mutant

on: push

jobs:
  mutant:
    name: Mutation coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
    - run: |
        gem install bundler
        bundle install
    - run: bundle exec rake mutant
